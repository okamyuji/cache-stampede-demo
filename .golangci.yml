version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - bodyclose
    - noctx
    - contextcheck
    - prealloc
    - copyloopvar
    - misspell
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G104
        - G304
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Writer).Write
        - (*bytes.Buffer).Write
        - (*strings.Builder).WriteString
    gocritic:
      disabled-checks:
        - exitAfterDefer
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - noctx
