title = "cache-stampede-demo gitleaks config"

[extend]
useDefault = true

[allowlist]
description = """\
.env.exampleはマスク済みのサンプルなのでallowlist。
.envはローカル専用かつ.gitignoreで保護されておりgitに混入しないため
作業ツリーのno-git scanからは除外する。
"""
paths = [
  '''\.env\.example''',
  '''^\.env$''',
]
regexes = [
  '''\*\*\*MASKED\*\*\*''',
]
